services:
  - type: web
    name: lessonproof
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 45
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LESSONPROOF_PLANNER_MODE
        value: fixture
