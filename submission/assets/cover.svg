<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LessonProof competition cover</title>
  <desc id="desc">An original editorial cover showing the LessonProof correction-to-proof workflow: a bounded GPT-5.6 proposal, expert approval, six deterministic checks, and a proof hash.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5e9df"/>
      <stop offset="0.48" stop-color="#f4f0e8"/>
      <stop offset="1" stop-color="#e9eef0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d15f35" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#d15f35" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1d211b" opacity="0.075"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#24271f" flood-opacity="0.12"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#24271f" flood-opacity="0.1"/>
    </filter>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .ink { fill: #1d211b; }
      .muted { fill: #656b62; }
      .eyebrow { font-size: 18px; font-weight: 800; letter-spacing: 3.2px; }
      .label { font-size: 15px; font-weight: 800; letter-spacing: 1.7px; }
      .small { font-size: 15px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="1325" cy="100" rx="380" ry="330" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <path d="M0 758 C290 710 470 810 730 766 C1020 716 1210 806 1600 732 L1600 900 L0 900 Z" fill="#fbfaf6" opacity="0.62"/>

  <g class="sans">
    <g transform="translate(96 70)">
      <rect width="58" height="58" rx="17" fill="#1d211b"/>
      <text x="29" y="36" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="850">LP</text>
      <text x="78" y="26" class="ink" font-size="27" font-weight="820" letter-spacing="-0.8">LessonProof</text>
      <text x="78" y="49" class="muted" font-size="13" font-weight="720" letter-spacing="1.7">VERIFIED EDUCATIONAL RELEASES</text>
    </g>

    <g transform="translate(96 232)">
      <text class="eyebrow" fill="#d15f35">EXPERT CORRECTION → RELEASE PROOF</text>
      <text y="96" class="ink" font-size="84" font-weight="850" letter-spacing="-5.5">
        <tspan x="0">From expert</tspan>
        <tspan x="0" dy="88">correction to</tspan>
        <tspan x="0" dy="88">release proof.</tspan>
      </text>
      <text y="392" class="muted" font-size="23" font-weight="520">
        <tspan x="0">AI proposes a bounded repair.</tspan>
        <tspan x="0" dy="36">The expert approves. Deterministic checks decide.</tspan>
      </text>
    </g>

    <g transform="translate(96 734)">
      <g>
        <rect width="170" height="48" rx="24" fill="#f5dfd4" stroke="#d15f35" stroke-opacity="0.28"/>
        <circle cx="27" cy="24" r="7" fill="#d15f35"/>
        <text x="46" y="30" class="small" fill="#7c3a24">AI proposes</text>
      </g>
      <g transform="translate(184 0)">
        <rect width="184" height="48" rx="24" fill="#e2ebf3" stroke="#305f8c" stroke-opacity="0.28"/>
        <circle cx="27" cy="24" r="7" fill="#305f8c"/>
        <text x="46" y="30" class="small" fill="#244f76">Expert approves</text>
      </g>
      <g transform="translate(382 0)">
        <rect width="178" height="48" rx="24" fill="#dcecdf" stroke="#1d6b49" stroke-opacity="0.3"/>
        <circle cx="27" cy="24" r="7" fill="#1d6b49"/>
        <text x="46" y="30" class="small" fill="#174e36">Checks decide</text>
      </g>
    </g>

    <g transform="translate(920 126)" filter="url(#shadow)">
      <rect width="574" height="646" rx="34" fill="#fbfaf6" stroke="#1d211b" stroke-opacity="0.13"/>
      <g transform="translate(42 34)">
        <text class="label" fill="#656b62">ONE CORRECTION-TO-PROOF JOURNEY</text>
        <text y="35" class="ink" font-size="23" font-weight="780">Inverse notation without the reciprocal trap</text>
      </g>

      <path d="M82 143 V522" stroke="#c8c8c0" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>

      <g transform="translate(42 116)" filter="url(#smallShadow)">
        <circle cx="40" cy="40" r="20" fill="#d15f35"/>
        <text x="40" y="46" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="820">1</text>
        <rect x="78" width="442" height="92" rx="18" fill="#fff5f0" stroke="#d15f35" stroke-opacity="0.35"/>
        <text x="104" y="28" class="label" fill="#9b3d1f">EXPERT CORRECTION</text>
        <text x="104" y="61" class="mono" fill="#71301d" font-size="17">sin⁻¹(x) ≠ 1/sin(x)</text>
        <text x="104" y="81" fill="#8a5b4c" font-size="13">Bound to source + target evidence</text>
      </g>

      <g transform="translate(42 230)" filter="url(#smallShadow)">
        <circle cx="40" cy="40" r="20" fill="#305f8c"/>
        <text x="40" y="46" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="820">2</text>
        <rect x="78" width="442" height="92" rx="18" fill="#edf4fa" stroke="#305f8c" stroke-opacity="0.34"/>
        <text x="104" y="28" class="label" fill="#244f76">GPT-5.6 READ-ONLY PLAN</text>
        <text x="104" y="58" class="mono" fill="#2f4d66" font-size="17">− 1/sin(x)   + arcsin(x)</text>
        <text x="104" y="79" fill="#576b7d" font-size="13">Strict schema · allowlisted patch</text>
      </g>

      <g transform="translate(42 344)" filter="url(#smallShadow)">
        <circle cx="40" cy="40" r="20" fill="#1d6b49"/>
        <text x="40" y="46" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="820">3</text>
        <rect x="78" width="442" height="92" rx="18" fill="#edf5ee" stroke="#1d6b49" stroke-opacity="0.34"/>
        <text x="104" y="28" class="label" fill="#174e36">EXPLICIT REVIEWER APPROVAL</text>
        <text x="104" y="58" class="ink" font-size="17" font-weight="720">Exact plan ID + current release hash</text>
        <text x="104" y="79" fill="#52695b" font-size="13">No silent mutation</text>
      </g>

      <g transform="translate(42 458)" filter="url(#smallShadow)">
        <circle cx="40" cy="40" r="20" fill="#1d211b"/>
        <text x="40" y="46" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="820">4</text>
        <rect x="78" width="442" height="112" rx="18" fill="#1d211b"/>
        <text x="104" y="28" class="label" fill="#b9d9c2">SIX CHECKS → PROOF HASH</text>
        <g transform="translate(104 46)">
          <g fill="#dcecdf">
            <circle cx="7" cy="7" r="7"/><circle cx="52" cy="7" r="7"/><circle cx="97" cy="7" r="7"/>
            <circle cx="142" cy="7" r="7"/><circle cx="187" cy="7" r="7"/><circle cx="232" cy="7" r="7"/>
          </g>
          <g fill="#1d6b49" font-size="10" font-weight="900" text-anchor="middle">
            <text x="7" y="11">✓</text><text x="52" y="11">✓</text><text x="97" y="11">✓</text>
            <text x="142" y="11">✓</text><text x="187" y="11">✓</text><text x="232" y="11">✓</text>
          </g>
        </g>
        <text x="104" y="91" class="mono" fill="#ffffff" font-size="16">sha256: 57aede91…bde41c</text>
      </g>

      <g transform="translate(42 592)">
        <rect width="490" height="1" fill="#d8d5ca"/>
        <text y="28" class="muted" font-size="13">Synthetic educational fixture · deterministic release authority</text>
      </g>
    </g>

    <text x="1500" y="844" text-anchor="end" fill="#656b62" font-size="14" font-weight="680" letter-spacing="0.8">LESSONPROOF · 2026</text>
  </g>
</svg>
