<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LessonProof YouTube demo thumbnail</title>
  <desc id="desc">A high-contrast original thumbnail reading One correction, six checks, release proof, with a synthetic inverse-sine caption correction and six passing check marks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171a16"/>
      <stop offset="0.62" stop-color="#1d211b"/>
      <stop offset="1" stop-color="#25332b"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d15f35" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#d15f35" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .kicker { font-size: 16px; font-weight: 830; letter-spacing: 2.4px; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <ellipse cx="1125" cy="112" rx="410" ry="320" fill="url(#orangeGlow)"/>
  <rect width="1280" height="720" fill="url(#dots)"/>
  <path d="M0 655C270 600 510 704 790 652C1000 612 1114 628 1280 582V720H0Z" fill="#111410" opacity="0.62"/>

  <g class="sans">
    <g transform="translate(66 52)">
      <rect width="52" height="52" rx="15" fill="#fbfaf6"/>
      <text x="26" y="33" text-anchor="middle" fill="#1d211b" font-size="14" font-weight="850">LP</text>
      <text x="70" y="34" fill="#ffffff" font-size="28" font-weight="830" letter-spacing="-0.8">LessonProof</text>
    </g>

    <g transform="translate(66 172)">
      <text class="kicker" fill="#efa07f">EXPERT CORRECTION → VERIFIED RELEASE</text>
      <text y="88" fill="#ffffff" font-size="72" font-weight="870" letter-spacing="-4.4">ONE CORRECTION.</text>
      <text y="168" fill="#efa07f" font-size="72" font-weight="870" letter-spacing="-4.4">SIX CHECKS.</text>
      <text y="248" fill="#dcecdf" font-size="72" font-weight="870" letter-spacing="-4.4">RELEASE PROOF.</text>
      <text y="306" fill="#aeb6ac" font-size="22" font-weight="570">GPT-5.6 proposes. The expert approves. Checks decide.</text>
    </g>

    <g transform="translate(770 112)" filter="url(#shadow)">
      <rect width="444" height="502" rx="30" fill="#fbfaf6"/>
      <g transform="translate(28 28)">
        <text class="kicker" fill="#656b62">SYNTHETIC CAPTION REPAIR</text>
        <text y="32" fill="#1d211b" font-size="20" font-weight="780">Inverse notation without the reciprocal trap</text>
      </g>

      <g transform="translate(28 96)">
        <rect width="388" height="104" rx="18" fill="#fff0ea" stroke="#d15f35" stroke-opacity="0.45"/>
        <circle cx="34" cy="34" r="16" fill="#d15f35"/>
        <path d="M27 27L41 41M41 27L27 41" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <text x="62" y="31" fill="#9b3d1f" font-size="14" font-weight="800" letter-spacing="1.3">WRONG CAPTION</text>
        <text x="28" y="76" class="mono" fill="#71301d" font-size="23">sin⁻¹(x) = 1/sin(x)</text>
      </g>

      <g transform="translate(200 212)">
        <circle cx="22" cy="22" r="22" fill="#305f8c"/>
        <path d="M12 22H31M25 15L32 22L25 29" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <g transform="translate(28 268)">
        <rect width="388" height="104" rx="18" fill="#e4f1e6" stroke="#1d6b49" stroke-opacity="0.48"/>
        <circle cx="34" cy="34" r="16" fill="#1d6b49"/>
        <path d="M26 34L32 40L43 27" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="62" y="31" fill="#174e36" font-size="14" font-weight="800" letter-spacing="1.3">EXPERT-APPROVED PATCH</text>
        <text x="28" y="76" class="mono" fill="#174e36" font-size="23">sin⁻¹(x) = arcsin(x)</text>
      </g>

      <g transform="translate(28 398)">
        <text class="kicker" fill="#656b62">DETERMINISTIC GATE</text>
        <g transform="translate(0 22)">
          <g fill="#dcecdf">
            <circle cx="18" cy="18" r="18"/><circle cx="80" cy="18" r="18"/><circle cx="142" cy="18" r="18"/>
            <circle cx="204" cy="18" r="18"/><circle cx="266" cy="18" r="18"/><circle cx="328" cy="18" r="18"/>
          </g>
          <g fill="#1d6b49" font-size="18" font-weight="900" text-anchor="middle">
            <text x="18" y="24">✓</text><text x="80" y="24">✓</text><text x="142" y="24">✓</text>
            <text x="204" y="24">✓</text><text x="266" y="24">✓</text><text x="328" y="24">✓</text>
          </g>
        </g>
      </g>
    </g>

    <g transform="translate(66 620)">
      <rect width="568" height="42" rx="21" fill="#2a3028" stroke="#dcecdf" stroke-opacity="0.2"/>
      <text x="24" y="27" fill="#dcecdf" font-size="14" font-weight="760" letter-spacing="0.7">EVIDENCE-BOUND · HUMAN-CONTROLLED · HASH-VERIFIED</text>
    </g>
  </g>
</svg>
